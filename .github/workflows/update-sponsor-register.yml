name: Update sponsor register

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1-5'

permissions:
  contents: write

jobs:
  update-sponsor-register:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download latest GOV.UK sponsor register
        run: |
          set -euo pipefail
          mkdir -p app/data
          curl -L "https://assets.publishing.service.gov.uk/media/6a32aa2fc6e94f095f3ef97b/2026-06-17_-_Worker_and_Temporary_Worker.csv" -o app/data/sponsor_register.csv
          test -s app/data/sponsor_register.csv
          head -n 1 app/data/sponsor_register.csv | grep -q "Organisation Name"

      - name: Commit sponsor register if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/data/sponsor_register.csv
          if git diff --cached --quiet; then
            echo "Sponsor register already up to date."
          else
            git commit -m "Update full GOV.UK sponsor register"
            git push
          fi
